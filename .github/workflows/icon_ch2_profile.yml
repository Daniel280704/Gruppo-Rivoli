name: Invio Grafico Unificato ICON-CH2

on:
  schedule:
    # Cron ogni 90 minuti (sfalsato rispetto a ICON-D2 per evitare conflitti git push)
    - cron: '22 0,3,6,9,12,15,18,21 * * *'
    - cron: '52 1,4,7,10,13,16,19,22 * * *'
  
  workflow_dispatch:

jobs:
  genera_e_invia_iconch2:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pandas matplotlib

      - name: Esegui Script ICON-CH2
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_HD: ${{ secrets.TELEGRAM_THREAD_ID_HD }}
        run: python icon_ch2_profile.py

      - name: Salva il file hash dei dati (Commit & Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ultimo_hash_icon_ch2.txt || true
          git commit -m "Aggiornamento hash dati unificato ICON-CH2 [skip ci]" || echo "Nessun nuovo run ICON-CH2"
          git push