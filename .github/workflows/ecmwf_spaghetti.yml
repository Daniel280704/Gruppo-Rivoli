name: Invio Grafico Spaghetti ECMWF

on:
  schedule:
    # Gira ai minuti 27 di:
    # 08, 09, 10 UTC -> 10:27, 11:27, 12:27 Italiane (Mattino)
    # 20, 21, 22 UTC -> 22:27, 23:27, 00:27 Italiane (Sera/Notte)
    - cron: '27 8,9,10,20,21,22 * * *'
  
  workflow_dispatch:

jobs:
  genera_e_invia_spaghetti:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pandas matplotlib

      - name: Esegui Script Spaghetti ECMWF
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_ECMWF: ${{ secrets.TELEGRAM_THREAD_ID_ECMWF }}
        run: python ecmwf_spaghetti.py

      - name: Salva il file hash dei dati (Commit & Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ultimo_hash_ecmwf_spaghetti.txt || true
          git commit -m "Aggiornamento hash dati Spaghetti ECMWF [skip ci]" || echo "Nessun nuovo run Spaghetti"
          git push