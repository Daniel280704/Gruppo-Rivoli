name: Invio Grafico Spaghetti ECMWF

on:
  schedule:
    # Gira ogni 3 ore (sfalsato al minuto 33 per non sovrapporsi)
    - cron: '33 */3 * * *'
  
  workflow_dispatch:

jobs:
  genera_e_invia_spaghetti:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pandas matplotlib

      - name: Esegui Script Spaghetti ECMWF
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_ECMWF: ${{ secrets.TELEGRAM_THREAD_ID_ECMWF }}
        run: python ecmwf_spaghetti.py

      - name: Salva aggiornamento orario (Commit & Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ultima_ora_ecmwf_spaghetti.txt || true
          git commit -m "Aggiornamento orario ECMWF Spaghetti [skip ci]" || echo "Nessun nuovo run ECMWF Spaghetti"
          git pull --rebase origin main
          git push
