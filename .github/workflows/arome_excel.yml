name: "Generazione Excel Profilo Atmosferico AROME"

on:
  schedule:
    # Esegue al minuto 12 ogni 2 ore, SOLO nei mesi da Novembre ad Aprile
    - cron: '12 */2 * 1-4,11-12 *'
  
  workflow_dispatch:

jobs:
  genera_e_invia_excel_arome:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl

      - name: Esegui Script AROME Excel
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_HD_NEVE: ${{ secrets.TELEGRAM_THREAD_ID_HD_NEVE }}
        run: python arome_excel.py

      - name: Salva aggiornamento orario (Commit & Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ultima_ora_arome_excel.txt || true
          git commit -m "Aggiornamento orario AROME Excel [skip ci]" || echo "Nessun nuovo run AROME"
          git pull --rebase origin main
          git push
