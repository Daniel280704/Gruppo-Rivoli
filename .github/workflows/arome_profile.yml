name: Invio Grafico Unificato AROME

on:
  schedule:
    # Cron ogni 90 minuti (sfalsato ai minuti 02 e 32 per evitare conflitti git push)
    - cron: '32 0,3,6,9,12,15,18,21 * * *'
    - cron: '02 2,5,8,11,14,17,20,23 * * *'
  
  workflow_dispatch:

jobs:
  genera_e_invia_arome:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pandas matplotlib

      - name: Esegui Script AROME
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_HD: ${{ secrets.TELEGRAM_THREAD_ID_HD }}
        run: python arome_profile.py

      - name: Salva il file hash dei dati (Commit & Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ultimo_hash_arome.txt || true
          git commit -m "Aggiornamento hash dati unificato AROME [skip ci]" || echo "Nessun nuovo run AROME"
          git push