name: Invio Grafico Unificato AROME

on:
  schedule:
    # Esegue ogni 2 ore ai minuti 12 (4 run deterministici al giorno)
    - cron: '12 */2 * * *'
  
  workflow_dispatch:

jobs:
  genera_e_invia_arome:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pandas matplotlib

      - name: Esegui Script AROME
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_HD: ${{ secrets.TELEGRAM_THREAD_ID_HD }}
        run: python arome_profile.py

      - name: Salva aggiornamento orario (Commit & Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ultima_ora_arome.txt || true
          git commit -m "Aggiornamento orario AROME [skip ci]" || echo "Nessun nuovo run AROME"
          git pull --rebase origin main
          git push
