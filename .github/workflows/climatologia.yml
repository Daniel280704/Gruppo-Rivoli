name: Automazione e Report Climatici

on:
  schedule:
    # Esegue ai minuti 14 delle ore 08, 10 e 12 UTC del 7° giorno del mese
    - cron: '14 8,10,12 7 * *'
    
  workflow_dispatch:
    # L'avvio manuale è libero, non richiede parametri e gira in modalità automatica per il mese in corso

jobs:
  run_reports:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pandas matplotlib

      - name: Esegui Report
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_STORIA: ${{ secrets.TELEGRAM_THREAD_ID_STORIA }}
        run: python report_climatico.py 

      - name: Salva il lock inviati (Commit & Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add lock_report_inviati.txt || true
          git commit -m "Aggiornamento lock report climatici [skip ci]" || echo "Nessun nuovo report inviato"
          git pull --rebase origin main
          git push
