name: Invio Grafico Profilo ECMWF AIFS

on:
  schedule:
    # Esegue al minuto 27 di ogni 3 ore, per tutto il giorno
    - cron: '27 */3 * * *'
  
  workflow_dispatch:

jobs:
  genera_e_invia_grafico:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pandas matplotlib

      - name: Esegui Script Grafico AIFS
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_ECMWF: ${{ secrets.TELEGRAM_THREAD_ID_ECMWF }}
        run: python ecmwf_aifs.py

      - name: Salva il file hash dei dati (Commit & Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ultimo_hash_ecmwf_aifs.txt || true
          git commit -m "Aggiornamento hash dati AIFS [skip ci]" || echo "Nessun nuovo run AIFS"
          git pull --rebase origin main
          git push
