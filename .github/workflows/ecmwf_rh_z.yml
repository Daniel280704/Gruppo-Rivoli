name: Invio Colonna Umidità e Geopotenziale ECMWF

on:
  schedule:
    # Gira ogni 3 ore (sfalsato al minuto 23 per non sovrapporsi)
    - cron: '23 */3 * * *'
  
  workflow_dispatch:

jobs:
  genera_e_invia_rh_z:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pandas matplotlib

      - name: Esegui Script RH-Z ECMWF
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_ECMWF: ${{ secrets.TELEGRAM_THREAD_ID_ECMWF }}
        run: python ecmwf_rh_z.py

      - name: Salva aggiornamento hash (Commit & Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ultimo_hash_ecmwf_rh_z.txt || true
          git commit -m "Aggiornamento hash ECMWF RH-Z [skip ci]" || echo "Nessun nuovo run ECMWF RH-Z"
          git pull --rebase origin main
          git push
