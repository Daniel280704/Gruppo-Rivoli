name: Invio Grafico Spaghetti Google WeatherNext 2

on:
  schedule:
    # Esegue al minuto 35 ogni 3 ore, ben sfalsato per non accavallarsi con il profilo base Google
    - cron: '35 */3 * * *'
  
  workflow_dispatch:

jobs:
  genera_e_invia_spaghetti_google:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pandas matplotlib

      - name: Esegui Script Spaghetti Google WNX2
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_GOOGLE: ${{ secrets.TELEGRAM_THREAD_ID_GOOGLE }}
        run: python google_weathernext_spaghetti.py

      - name: Salva il file hash dei dati (Commit & Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ultimo_hash_google_wnx_spaghetti.txt || true
          git commit -m "Aggiornamento hash dati Spaghetti Google WNX2 [skip ci]" || echo "Nessun nuovo run Google Spaghetti"
          git pull --rebase origin main
          git push
