name: Invio Grafico Unificato ICON-2I

on:
  schedule:
    # Esegue ogni 3 ore al minuto 22 (2 run deterministici al giorno)
    - cron: '22 */3 * * *'
  
  workflow_dispatch:

jobs:
  genera_e_invia_icon2i:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pandas matplotlib

      - name: Esegui Script ICON-2I
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_HD: ${{ secrets.TELEGRAM_THREAD_ID_HD }}
        run: python icon_2i_profile.py

      - name: Salva aggiornamento orario (Commit & Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ultima_ora_icon_2i.txt || true
          git commit -m "Aggiornamento orario ICON-2I [skip ci]" || echo "Nessun nuovo run ICON-2I"
          git pull --rebase origin main
          git push
