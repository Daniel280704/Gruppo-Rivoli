name: "Aggiornamento Meteogramma ICON-D2"

on:
  schedule:
    # Esegue al minuto 30 ogni 3 ore (00:30, 03:30, 06:30, ecc...)
    - cron: '30 */3 * * *'
  # Permette di lanciare l'aggiornamento manualmente dall'interfaccia di GitHub
  workflow_dispatch:

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa le dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pandas matplotlib

      - name: Genera il meteogramma e invia a Telegram
        env:
          # Le variabili d'ambiente passate in modo sicuro da GitHub Secrets
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_HD: ${{ secrets.TELEGRAM_THREAD_ID_HD }}
        run: |
          python icon_d2_meteogram.py