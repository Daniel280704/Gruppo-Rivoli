name: "Generazione Excel Profilo Atmosferico ICON-D2"

on:
  schedule:
    # Esegue al minuto 42 ogni ora, SOLO nei mesi da Novembre ad Aprile
    - cron: '42 * * 1-4,11-12 *' 
  workflow_dispatch:

jobs:
  generate-excel:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa le dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl

      - name: Genera e invia file Excel
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_HD_NEVE: ${{ secrets.TELEGRAM_THREAD_ID_HD_NEVE }}
        run: |
          python icon_d2_excel.py

      - name: Salva aggiornamento orario (Commit & Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ultima_ora_icon_d2_excel.txt || true
          git commit -m "Aggiornamento orario ICON-D2 Excel [skip ci]" || echo "Nessun nuovo run ICON-D2"
          git pull --rebase origin main
          git push
