name: Invio Grafico Unificato ICON-D2

on:
  schedule:
    # Esegue ogni ora al minuto 52 (8 run ensemble al giorno)
    - cron: '52 * * * *'
  
  workflow_dispatch:

jobs:
  genera_e_invia_icond2:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pandas matplotlib

      - name: Esegui Script ICON-D2
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_HD: ${{ secrets.TELEGRAM_THREAD_ID_HD }}
        run: python icon_d2_profile.py

      - name: Salva aggiornamento orario (Commit & Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ultima_ora_icon_d2.txt || true
          git commit -m "Aggiornamento orario ICON-D2 [skip ci]" || echo "Nessun nuovo run ICON-D2"
          git pull --rebase origin main
          git push
