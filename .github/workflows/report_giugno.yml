name: Invio Report Climatico Mensile

on:
  workflow_dispatch: # L'esecuzione è manuale: lo avvii tu cliccando "Run workflow"

jobs:
  genera_e_invia_report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pandas matplotlib

      - name: Esegui Script Report Giugno
        env:
          # Ecco qui i secret! Usa sempre gli stessi.
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_STORIA: ${{ secrets.TELEGRAM_THREAD_ID_STORIA }}
        run: python report_giugno.py 
        # (Assicurati che il nome del file .py corrisponda a quello che hai salvato nel repository)