name: Invio Grafico Profilo ECMWF

on:
  schedule:
    # Gira ai minuti 27 di:
    # 09, 10, 11 UTC -> 11:27, 12:27, 13:27 Italiane (Mattino)
    # 21, 22, 23 UTC -> 23:27, 24:27, 01:27 Italiane (Sera/Notte)
    - cron: '27 9,10,11,21,22,23 * * *'
  
  workflow_dispatch:

jobs:
  genera_e_invia_grafico:
    runs-on: ubuntu-latest
    permissions:
      contents: write # FONDAMENTALE: Consente di committare il file hash .txt

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pandas matplotlib

      - name: Esegui Script Grafico ECMWF
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_ECMWF: ${{ secrets.TELEGRAM_THREAD_ID_ECMWF }}
        run: python ecmwf.py

      - name: Salva il file hash dei dati ECMWF (Commit & Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ultimo_hash_ecmwf.txt || true
          git commit -m "Aggiornamento hash dati ECMWF [skip ci]" || echo "Nessun nuovo run ECMWF, hash invariato"
          git push
